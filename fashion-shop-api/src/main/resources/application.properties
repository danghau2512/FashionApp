spring.application.name=fashion-shop-api

server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/fashion_shop_db?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.jackson.time-zone=Asia/Ho_Chi_Minh

ghn.base-url=https://dev-online-gateway.ghn.vn/shiip/public-api
ghn.token=${GHN_TOKEN}
ghn.shop-id=${GHN_SHOP_ID}

ghn.from-district-id=${GHN_FROM_DISTRICT_ID}
ghn.from-ward-code=${GHN_FROM_WARD_CODE}

ghn.default-item-weight=${GHN_DEFAULT_ITEM_WEIGHT:300}
ghn.package-length=${GHN_PACKAGE_LENGTH:25}
ghn.package-width=${GHN_PACKAGE_WIDTH:20}
ghn.package-height=${GHN_PACKAGE_HEIGHT:10}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
